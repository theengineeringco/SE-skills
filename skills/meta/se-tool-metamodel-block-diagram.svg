<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .box-sub { font: 400 12px Arial, sans-serif; fill: #334155; }
      .rel { font: 600 12px Arial, sans-serif; fill: #1e293b; }
      .legend { font: 400 12px Arial, sans-serif; fill: #334155; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .entity-a { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .entity-b { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1.5; rx: 10; }
      .entity-c { fill: #dcfce7; stroke: #22c55e; stroke-width: 1.5; rx: 10; }
      .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .line-dashed { stroke: #475569; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="28" y="40" class="title">AI-Enabled SE Tool Meta Model (Block Diagram)</text>
  <text x="28" y="64" class="subtitle">Entities and labeled relationships aligned to SK-DM-001 and supporting skills</text>

  <!-- Group panels -->
  <rect x="30" y="90" width="300" height="820" class="group"/>
  <text x="44" y="116" class="subtitle">Structure / Context Entities</text>

  <rect x="350" y="90" width="320" height="820" class="group"/>
  <text x="364" y="116" class="subtitle">Requirements / Interface / Values</text>

  <rect x="690" y="90" width="330" height="820" class="group"/>
  <text x="704" y="116" class="subtitle">Verification Flow Entities</text>

  <rect x="1040" y="90" width="220" height="820" class="group"/>
  <text x="1054" y="116" class="subtitle">Grouping Entities</text>

  <!-- Left column entities -->
  <rect x="70" y="140" width="220" height="70" class="entity-a"/>
  <text x="88" y="166" class="box-title">system (folder)</text>
  <text x="88" y="186" class="box-sub">systemType, level, owner</text>

  <rect x="70" y="240" width="220" height="70" class="entity-a"/>
  <text x="88" y="266" class="box-title">feature</text>
  <text x="88" y="286" class="box-sub">name, description</text>

  <rect x="70" y="340" width="220" height="70" class="entity-a"/>
  <text x="88" y="366" class="box-title">function</text>
  <text x="88" y="386" class="box-sub">name, description</text>

  <rect x="70" y="440" width="220" height="70" class="entity-a"/>
  <text x="88" y="466" class="box-title">useCase</text>
  <text x="88" y="486" class="box-sub">name, description</text>

  <rect x="70" y="560" width="220" height="70" class="entity-a"/>
  <text x="88" y="586" class="box-title">diagram</text>
  <text x="88" y="606" class="box-sub">name, description, umlText</text>

  <rect x="70" y="680" width="220" height="70" class="entity-a"/>
  <text x="88" y="706" class="box-title">document</text>
  <text x="88" y="726" class="box-sub">name, description, owner</text>

  <rect x="70" y="800" width="220" height="90" class="entity-a"/>
  <text x="88" y="826" class="box-title">risk</text>
  <text x="88" y="846" class="box-sub">failureMode, effect, cause</text>
  <text x="88" y="864" class="box-sub">severity/occurrence/detection</text>

  <!-- Middle column entities -->
  <rect x="400" y="180" width="220" height="90" class="entity-b"/>
  <text x="418" y="206" class="box-title">requirement</text>
  <text x="418" y="226" class="box-sub">verificationMethod[]</text>
  <text x="418" y="244" class="box-sub">verificationStatus</text>
  <text x="418" y="262" class="box-sub">pass/FailCriteria</text>

  <rect x="400" y="320" width="220" height="80" class="entity-b"/>
  <text x="418" y="346" class="box-title">interface</text>
  <text x="418" y="366" class="box-sub">provider, consumer</text>
  <text x="418" y="384" class="box-sub">protocol/Standard, status</text>

  <rect x="400" y="460" width="220" height="80" class="entity-b"/>
  <text x="418" y="486" class="box-title">designValue</text>
  <text x="418" y="506" class="box-sub">value, unit</text>
  <text x="418" y="524" class="box-sub">sourceReference, maturityStage</text>

  <!-- Right column entities -->
  <rect x="740" y="180" width="230" height="80" class="entity-c"/>
  <text x="758" y="206" class="box-title">testPlan</text>
  <text x="758" y="226" class="box-sub">objectives, scope, approach</text>
  <text x="758" y="244" class="box-sub">entryCriteria, exitCriteria</text>

  <rect x="740" y="310" width="230" height="90" class="entity-c"/>
  <text x="758" y="336" class="box-title">testCase</text>
  <text x="758" y="356" class="box-sub">type, priority, status</text>
  <text x="758" y="374" class="box-sub">steps, expectedResults</text>
  <text x="758" y="392" class="box-sub">pass/FailCriteria</text>

  <rect x="740" y="450" width="230" height="80" class="entity-c"/>
  <text x="758" y="476" class="box-title">testRun</text>
  <text x="758" y="496" class="box-sub">status, environment, buildVersion</text>
  <text x="758" y="514" class="box-sub">executedBy</text>

  <rect x="740" y="580" width="230" height="90" class="entity-c"/>
  <text x="758" y="606" class="box-title">testResults</text>
  <text x="758" y="626" class="box-sub">status: Pass/Fail/Blocked/Skipped</text>
  <text x="758" y="644" class="box-sub">verdictNotes, evidence, stepResults</text>
  <text x="758" y="662" class="box-sub">notes</text>

  <!-- Grouping entities -->
  <rect x="1070" y="220" width="170" height="80" class="entity-b"/>
  <text x="1086" y="246" class="box-title">requirementsGroup</text>
  <text x="1086" y="266" class="box-sub">folder: groups requirements</text>

  <rect x="1070" y="360" width="170" height="80" class="entity-b"/>
  <text x="1086" y="386" class="box-title">designValueFolder</text>
  <text x="1086" y="406" class="box-sub">folder: groups values</text>

  <!-- Relationships -->
  <line x1="180" y1="210" x2="180" y2="240" class="line"/>
  <text x="188" y="230" class="rel">implements</text>

  <line x1="180" y1="310" x2="180" y2="340" class="line"/>
  <text x="188" y="330" class="rel">decomposes to</text>

  <line x1="180" y1="440" x2="180" y2="410" class="line"/>
  <text x="188" y="426" class="rel">realized by</text>

  <path d="M290,175 C335,175 350,205 400,225" class="line"/>
  <text x="310" y="168" class="rel">allocates / owns</text>

  <path d="M290,188 C345,225 355,315 400,350" class="line"/>
  <text x="300" y="266" class="rel">provider / consumer endpoint</text>

  <path d="M290,470 C345,455 352,280 400,245" class="line"/>
  <text x="304" y="430" class="rel">derives</text>

  <path d="M290,595 C345,560 355,390 400,360" class="line-dashed"/>
  <text x="300" y="560" class="rel">models</text>

  <path d="M290,705 C345,650 355,395 400,360" class="line-dashed"/>
  <text x="300" y="678" class="rel">specifies</text>

  <path d="M290,835 C350,790 360,280 400,245" class="line"/>
  <text x="304" y="804" class="rel">mitigated by</text>

  <path d="M290,850 C355,820 360,382 400,360" class="line"/>
  <text x="304" y="824" class="rel">impacts</text>

  <path d="M620,225 C680,240 700,330 740,350" class="line"/>
  <text x="644" y="248" class="rel">verified by</text>

  <line x1="855" y1="260" x2="855" y2="310" class="line"/>
  <text x="864" y="292" class="rel">contains</text>

  <line x1="855" y1="400" x2="855" y2="450" class="line"/>
  <text x="864" y="432" class="rel">executes as</text>

  <line x1="855" y1="530" x2="855" y2="580" class="line"/>
  <text x="864" y="562" class="rel">produces</text>

  <path d="M740,625 C680,620 650,535 620,500" class="line"/>
  <text x="634" y="594" class="rel">supports verification of</text>

  <path d="M620,360 C680,355 700,340 740,340" class="line"/>
  <text x="644" y="345" class="rel">verified by</text>

  <path d="M620,500 C700,500 725,385 740,360" class="line"/>
  <text x="650" y="484" class="rel">threshold source for criteria</text>

  <line x1="620" y1="245" x2="620" y2="460" class="line"/>
  <text x="628" y="365" class="rel">references value/unit</text>

  <line x1="1070" y1="260" x2="620" y2="245" class="line"/>
  <text x="846" y="246" class="rel">groups</text>

  <line x1="1070" y1="400" x2="620" y2="500" class="line"/>
  <text x="850" y="462" class="rel">groups</text>

  <!-- Legend -->
  <rect x="1048" y="760" width="205" height="140" class="entity-a"/>
  <text x="1064" y="786" class="box-title">Legend</text>
  <line x1="1064" y1="806" x2="1124" y2="806" class="line"/>
  <text x="1132" y="810" class="legend">Primary traceability</text>
  <line x1="1064" y1="832" x2="1124" y2="832" class="line-dashed"/>
  <text x="1132" y="836" class="legend">Reference/model link</text>
  <text x="1064" y="860" class="legend">Blue: requirement domain</text>
  <text x="1064" y="878" class="legend">Green: verification domain</text>
  <text x="1064" y="896" class="legend">Gray: structural/support</text>
</svg>
